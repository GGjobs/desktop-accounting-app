name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-2022
            artifact-name: desktop-accounting-windows
          - name: macOS
            os: macos-latest
            artifact-name: desktop-accounting-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Make app
        run: npm run make

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: out/make/**
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG_NAME#v}"
          mkdir -p release-upload

          windows_setup="$(find release-artifacts -type f -iname '*.exe' -print -quit)"
          macos_zip="$(find release-artifacts -type f -path '*darwin*' -name '*.zip' -print -quit)"

          if [[ -z "$windows_setup" ]]; then
            echo "Windows setup file was not found."
            find release-artifacts -type f -print
            exit 1
          fi

          if [[ -z "$macos_zip" ]]; then
            echo "macOS zip file was not found."
            find release-artifacts -type f -print
            exit 1
          fi

          cp "$windows_setup" "release-upload/Desktop-Accounting-${version}-Windows-Setup.exe"
          cp "$macos_zip" "release-upload/Desktop-Accounting-${version}-macOS-arm64.zip"

      - name: Create release and upload files
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "桌面记帐 $TAG_NAME"
          fi

          while IFS= read -r asset; do
            [[ -z "$asset" ]] && continue
            gh release delete-asset "$TAG_NAME" "$asset" --yes
          done < <(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')

          while IFS= read -r -d '' file; do
            gh release upload "$TAG_NAME" "$file" --clobber
          done < <(find release-upload -type f -print0)
